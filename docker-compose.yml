services:
  web:
    build: .
    container_name: atmblog
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - docker_network

networks:
  docker_network:
    external: true
    name: docker_network
