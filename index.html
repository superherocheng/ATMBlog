<h2 class="font-display text-2xl font-bold mb-4">History <span class="amp">&amp;</span> Background</h2>
<p class="mb-4 leading-relaxed">Cloudflare was founded in 2009 by Matthew Prince, Lee Holloway, and Michelle Zatlyn, emerging from Project Honey Pot — an open-source initiative that tracked online spam and malicious activity. The founders recognized that the web's infrastructure was fundamentally insecure and slow, and that a shared performance and security layer could serve millions of sites simultaneously.</p>
<p class="mb-4 leading-relaxed">The company launched at TechCrunch Disrupt in 2010 and went public on the NYSE in September 2019. By 2026, Cloudflare serves approximately one-third of all internet traffic, operates in 330+ cities across 120+ countries, and has expanded from a simple CDN into a comprehensive cloud platform.</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Core Infrastructure</h2>

<h3 class="font-display text-lg font-bold mb-2">CDN (Content Delivery Network)</h3>
<p class="mb-4 leading-relaxed">Cloudflare's CDN caches and serves static and dynamic content from its global edge network. When a visitor requests a page, Cloudflare routes the request to the nearest data center, reducing latency and origin server load. The CDN handles HTTP/3, automatic image optimization, and intelligent caching rules out of the box.</p>

<h3 class="font-display text-lg font-bold mb-2">DNS Management</h3>
<p class="mb-4 leading-relaxed">Cloudflare DNS is one of the fastest recursive DNS resolvers in the world (the 1.1.1.1 consumer service) and a major authoritative DNS provider. Key features include DNSSEC support, CNAME flattening (allowing CNAME records at the root domain), and Anycast routing that resolves queries from the nearest node. Moving DNS to Cloudflare is often the first step in a migration.</p>

<h3 class="font-display text-lg font-bold mb-2">DDoS Protection</h3>
<p class="mb-4 leading-relaxed">Cloudflare's DDoS mitigation operates at layers 3, 4, and 7 of the OSI model. The system uses traffic analytics to detect and absorb volumetric attacks (UDP floods, SYN floods, amplification attacks) before they reach the origin. Layer 7 protection applies rate limiting, bot management, and JavaScript challenges to HTTP traffic. Cloudflare has mitigated some of the largest DDoS attacks ever recorded, exceeding 1 Tbps.</p>

<h3 class="font-display text-lg font-bold mb-2">Edge Computing / Workers</h3>
<p class="mb-4 leading-relaxed">Cloudflare Workers is a serverless compute platform that runs JavaScript, TypeScript, Python, and WebAssembly at the edge. Workers execute in Cloudflare's V8 isolates (not containers), enabling sub-millisecond cold starts. Use cases include A/B testing, edge authentication, API aggregation, image transformation, and custom caching logic. Workers KV and Durable Objects provide distributed storage and stateful computation.</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Practical Guide: How to Use Cloudflare</h2>
<ol class="list-decimal list-inside mb-4 space-y-3">
<li><strong>Create an account and add your domain.</strong> Sign up at dash.cloudflare.com, click "Add a site," and enter your domain. Cloudflare scans existing DNS records automatically.</li>
<li><strong>Update nameservers at your registrar.</strong> Cloudflare assigns two nameservers (e.g., coco.ns.cloudflare.com). Replace your current nameservers with these at your domain registrar. DNS propagation typically completes within 24 hours.</li>
<li><strong>Configure SSL/TLS.</strong> Cloudflare provides free SSL certificates. Choose your SSL mode: "Flexible" (Cloudflare to origin over HTTP), "Full" (HTTPS to origin, no origin validation), or "Full (Strict)" (HTTPS with validated origin certificate). For production, always use "Full (Strict)."</li>
<li><strong>Set caching rules.</strong> Use Page Rules or Cache Rules to control TTL, bypass caching for dynamic content, or force caching for static assets. The default caching behavior handles most common cases without configuration.</li>
<li><strong>Enable security features.</strong> Activate "Under Attack Mode" for emergencies, configure WAF (Web Application Firewall) rules for ongoing protection, and set up rate limiting for API endpoints. Bot Management uses machine learning to classify traffic.</li>
<li><strong>Deploy a Worker (optional).</strong> Write edge logic in JavaScript/TypeScript using Wrangler (the CLI tool). Deploy with <code class="bg-neutral-100 px-1 border border-neutral-300 text-sm">wrangler deploy</code>. Workers can modify requests, implement A/B tests, authenticate users, or serve entirely from the edge.</li>
</ol>
`,

<h2 class="font-display text-2xl font-bold mb-4">Historical Background</h2>
<p class="mb-4 leading-relaxed">Quantitative trading traces its roots to the 1960s and 1970s, when mathematicians and physicists began applying statistical methods to financial markets. The seminal moment came in 1973 with the publication of the Black-Scholes option pricing model, which provided a mathematical framework for valuing derivatives. By the 1980s, firms like Renaissance Technologies (founded by mathematician Jim Simons) were deploying systematic, computer-driven strategies that would go on to generate some of the highest risk-adjusted returns in history.</p>
<p class="mb-4 leading-relaxed">The 1990s and 2000s saw the rise of high-frequency trading (HFT), enabled by co-location, direct market access, and fiber-optic networks. By the 2010s, machine learning and alternative data sources (satellite imagery, social media sentiment, credit card transactions) became standard tools in the quant arsenal. Today, quantitative strategies account for an estimated 60-70% of US equity trading volume.</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Market Landscape: China vs. International</h2>

<h3 class="font-display text-lg font-bold mb-2">International Markets</h3>
<p class="mb-4 leading-relaxed">The US and European quant landscape is dominated by established players: Citadel Securities, Two Sigma, D.E. Shaw, Jump Trading, and Jane Street. These firms operate across asset classes (equities, fixed income, commodities, crypto) and deploy capital at massive scale. The regulatory environment is relatively mature, with SEC and FCA oversight of algorithmic trading, market-making, and best execution.</p>

<h3 class="font-display text-lg font-bold mb-2">Chinese Markets (A-Shares)</h3>
<p class="mb-4 leading-relaxed">China's quant trading industry has grown rapidly, with firms like High-Flyer (Xunfang), Wizard Quant, and Lingjun Investments managing billions. The A-share market has structural characteristics that create unique opportunities: T+1 settlement, a large retail investor base (creating exploitable behavioral patterns), and sector rotation dynamics. However, regulatory constraints are tightening — China's securities regulator has imposed restrictions on high-frequency strategies and short selling in response to market volatility concerns.</p>

<h3 class="font-display text-lg font-bold mb-2">Key Differences</h3>
<table class="w-full border border-black mb-4 text-sm">
<thead><tr class="border-b border-black"><th class="p-2 text-left border-r border-black">Dimension</th><th class="p-2 text-left border-r border-black">International</th><th class="p-2 text-left">China (A-Shares)</th></tr></thead>
<tbody>
<tr class="border-b border-neutral-300"><td class="p-2 border-r border-black">Market structure</td><td class="p-2 border-r border-black">T+0, multiple exchanges</td><td class="p-2">T+1, SSE + SZSE</td></tr>
<tr class="border-b border-neutral-300"><td class="p-2 border-r border-black">Investor base</td><td class="p-2 border-r border-black">Institutional majority</td><td class="p-2">~70% retail</td></tr>
<tr class="border-b border-neutral-300"><td class="p-2 border-r border-black">Short selling</td><td class="p-2 border-r border-black">Widely available</td><td class="p-2">Heavily restricted</td></tr>
<tr class="border-b border-neutral-300"><td class="p-2 border-r border-black">HFT regulation</td><td class="p-2 border-r border-black">Established frameworks</td><td class="p-2">Tightening rapidly</td></tr>
<tr><td class="p-2 border-r border-black">Alpha decay</td><td class="p-2 border-r border-black">Fast (hours to days)</td><td class="p-2">Slower (days to weeks)</td></tr>
</tbody>
</table>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Core Methodologies</h2>

<h3 class="font-display text-lg font-bold mb-2">Statistical Arbitrage</h3>
<p class="mb-4 leading-relaxed">Statistical arbitrage (stat arb) exploits mean-reverting price discrepancies between correlated assets. Pairs trading — the simplest form — involves going long one asset and short another when their price spread diverges from the historical norm, then unwinding when it converges. Modern stat arb extends this to hundreds of simultaneous positions using factor models (value, momentum, volatility, quality) and cointegration analysis.</p>

<h3 class="font-display text-lg font-bold mb-2">High-Frequency Trading (HFT)</h3>
<p class="mb-4 leading-relaxed">HFT strategies operate on microsecond to millisecond timescales. Common approaches include market making (providing liquidity by quoting both sides of the order book), latency arbitrage (exploiting speed advantages to act on information before competitors), and order flow prediction (inferring near-term price moves from the pattern of incoming orders). HFT requires co-located servers, FPGA-accelerated networking, and custom hardware.</p>

<h3 class="font-display text-lg font-bold mb-2">Trend Following</h3>
<p class="mb-4 leading-relaxed">Trend following is one of the oldest systematic strategies, dating back to the "turtles" experiment by Richard Dennis in the 1980s. The core idea: buy assets making new highs, sell assets making new lows, and ride the trend with disciplined risk management. Modern implementations use time-series momentum, breakout systems, and adaptive moving averages across dozens of futures markets.</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Quantitative Thinking: A Philosophical Framework</h2>
<p class="mb-4 leading-relaxed">Quantitative thinking differs from traditional investment analysis in three fundamental ways:</p>
<ul class="list-disc list-inside mb-4 space-y-2">
<li><strong>Probabilistic reasoning over narrative.</strong> Quants don't ask "will this company succeed?" They ask "what is the probability-weighted expected return of this position, given the distribution of historical outcomes for similar setups?" Every trade is viewed as one sample from a statistical distribution — the individual outcome matters less than the edge across many trials.</li>
<li><strong>Systematic process over discretionary judgment.</strong> The strategy is encoded before the trade is placed. Entry, exit, position sizing, and risk limits are all rules-based. This removes emotional bias and enables rigorous backtesting. The quant's job is to design the system, not to make individual trade decisions.</li>
<li><strong>Risk as a first-class variable.</strong> Traditional investors often treat risk as an afterthought ("how much can I make?"). Quants treat risk as the primary input: Sharpe ratio, maximum drawdown, Value-at-Risk (VaR), and tail risk are measured, monitored, and optimized continuously. The Kelly criterion and position-sizing math determine how much capital to allocate to each edge.</li>
</ul>
`,

<p class="mb-4 leading-relaxed">As of mid-2026, the desktop operating system market looks like this:</p>

<p class="mb-4 leading-relaxed">The biggest story is <strong>Linux crossing 5%</strong> globally for the first time — driven by improved desktop distributions (Ubuntu 24.04, Fedora 42), the Steam Deck's gaming viability, and the approaching Windows 10 end-of-support in October 2025 which pushed many users to evaluate alternatives.</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Architectural Deep Dive</h2>

<h3 class="font-display text-lg font-bold mb-2">Windows: NT Kernel</h3>
<p class="mb-4 leading-relaxed">Windows runs on the <strong>NT kernel</strong> (New Technology), a hybrid kernel architecture that combines microkernel design principles with monolithic performance. The kernel manages the Hardware Abstraction Layer (HAL), executive services (memory management, I/O, IPC), and the Win32 subsystem that provides the Windows API. The registry serves as a centralized configuration database. NT's architecture prioritizes backward compatibility — applications written for Windows 95 can often still run on Windows 11 through compatibility layers.</p>
<p class="mb-4 leading-relaxed">Windows 11 introduced tighter hardware requirements (TPM 2.0, Secure Boot) tied to security improvements like Virtualization-Based Security (VBS) and Hypervisor-Protected Code Integrity (HVCI). The trade-off: millions of otherwise-capable machines were excluded from the upgrade, accelerating Linux adoption.</p>

<h3 class="font-display text-lg font-bold mb-2">macOS: XNU Kernel</h3>
<p class="mb-4 leading-relaxed">macOS is built on <strong>XNU</strong> (X is Not Unix), a hybrid kernel combining the Mach microkernel (for process/thread management and IPC) with components from BSD (for the POSIX API, networking, and file systems) and the I/O Kit driver framework. macOS is a certified Unix system — it conforms to the Single UNIX Specification.</p>
<p class="mb-4 leading-relaxed">Apple's transition from Intel x86 to <strong>Apple Silicon (ARM)</strong> beginning in 2020 was the most significant architectural shift in desktop computing in decades. The M1/M2/M3/M4 chips unified CPU, GPU, Neural Engine, and memory on a single die with a shared memory architecture, delivering industry-leading performance-per-watt. Rosetta 2 provides near-transparent x86-to-ARM binary translation.</p>

<h3 class="font-display text-lg font-bold mb-2">Linux: Monolithic Kernel (Modular)</h3>
<p class="mb-4 leading-relaxed">Linux uses a <strong>monolithic kernel</strong> architecture where the entire OS (process management, memory management, device drivers, file systems, networking) runs in kernel space. However, it supports loadable kernel modules (LKMs), allowing drivers and features to be loaded and unloaded dynamically — giving it much of the flexibility of a microkernel without the performance overhead of context switching.</p>
<p class="mb-4 leading-relaxed">The Linux kernel is developed independently of any particular distribution. Companies like Red Hat, Canonical, and SUSE build their distributions on top of the same upstream kernel. The kernel itself supports more hardware architectures than any other OS (x86, ARM, RISC-V, PowerPC, s390, and dozens more).</p>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Performance <span class="amp">&amp;</span> Hardware</h2>
<ul class="list-disc list-inside mb-4 space-y-2">
<li><strong>Windows</strong> excels at gaming (DirectX 12, Game Mode) and broad hardware compatibility. Resource usage is moderate — Windows 11 requires 4GB RAM minimum but runs best with 16GB+. The NT kernel handles multitasking well but has historically struggled with long uptime stability compared to Linux.</li>
<li><strong>macOS</strong> benefits enormously from Apple Silicon's unified memory architecture. M-series chips deliver desktop-class performance at laptop power envelopes (15-30W vs. 45-100W for comparable Intel/AMD). The trade-off is zero hardware upgradeability — RAM and storage are soldered.</li>
<li><strong>Linux</strong> is the most resource-efficient, running comfortably on 2GB RAM with lightweight desktop environments. It offers the most granular control over system resources (cgroups, namespaces, kernel parameters). Performance tuning is a first-class feature, not an afterthought.</li>
</ul>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Ecosystem <span class="amp">&amp;</span> Developer Experience</h2>
<ul class="list-disc list-inside mb-4 space-y-2">
<li><strong>Windows:</strong> WSL2 (Windows Subsystem for Linux) has made Windows a credible development platform, providing a real Linux kernel alongside Windows. Visual Studio remains the strongest IDE for .NET and C++. PowerShell has improved but remains less ergonomic than Unix shells. Package management (winget, Chocolatey) is functional but fragmented.</li>
<li><strong>macOS:</strong> The de facto standard for web and mobile development. Xcode for Apple-platform development, Homebrew for package management, and native Unix tooling (zsh, git, SSH) without emulation. The "walled garden" extends to distribution: macOS apps must be notarized by Apple, and the App Store takes a 15-30% cut.</li>
<li><strong>Linux:</strong> The most open ecosystem. Package managers (apt, dnf, pacman, nix) are powerful and scriptable. Docker, Kubernetes, and the entire cloud-native stack were born on Linux. The philosophical divide: freedom to modify anything vs. the responsibility to maintain it yourself. Tooling is unmatched for systems programming, DevOps, and infrastructure work.</li>
</ul>

<h2 class="font-display text-2xl font-bold mb-4 mt-8">Pros <span class="amp">&amp;</span> Cons</h2>
<h3 class="font-display text-lg font-bold mb-2">Windows</h3>
<ul class="list-disc list-inside mb-4 space-y-1">
<li><strong>Pros:</strong> Largest software library. Best gaming platform. Enterprise standard for office productivity. WSL2 bridges the Linux gap.</li>
<li><strong>Cons:</strong> Telemetry and privacy concerns. Forced updates. Bloated default installation. Declining user control over system configuration.</li>
</ul>
<h3 class="font-display text-lg font-bold mb-2">macOS</h3>
<ul class="list-disc list-inside mb-4 space-y-1">
<li><strong>Pros:</strong> Best hardware-software integration (Apple Silicon). Native Unix. Lowest-friction developer experience. Excellent creative professional tools.</li>
<li><strong>Cons:</strong> Expensive hardware with no upgrade path. Walled garden distribution. Limited gaming support. No user-repairable hardware.</li>
</ul>
<h3 class="font-display text-lg font-bold mb-2">Linux</h3>
<ul class="list-disc list-inside mb-4 space-y-1">
<li><strong>Pros:</strong> Free and open-source. Maximum control and customization. Best performance per hardware dollar. Unmatched for server/DevOps/cloud work.</li>
<li><strong>Cons:</strong> Desktop fragmentation (many distributions, inconsistent UX). Hardware compatibility gaps (Nvidia drivers, peripherals). Steeper learning curve. Professional creative software (Adobe, Figma) requires workarounds.</li>
</ul>

    /* Timeline — accepts events array, groups by year with scroll reveal */
    function TimelineList({ events }) {
      const itemRefs = useRef([]);

      useEffect(function () {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

        itemRefs.current.forEach(function (el) {
          if (el) observer.observe(el);
        });

        return function () { observer.disconnect(); };
      }, [events]);

      /* Group events by year */
      var grouped = [];
      var currentYear = null;
      events.forEach(function (evt) {
        if (evt.date !== currentYear) {
          currentYear = evt.date;
          grouped.push({ year: evt.date, events: [evt] });
        } else {
          grouped[grouped.length - 1].events.push(evt);
        }
      });

      return (
        <div className="relative pl-6">
          {/* Vertical spine — subtle 1px light gray */}
          <div className="absolute left-0 top-0 bottom-0 w-[1px] bg-gray-200 dark:bg-gray-800" />
          {grouped.map(function (group, gi) {
            return (
              <div key={gi} className={gi > 0 ? "mt-8" : ""}>
                {/* Year header — separate block, no overlap with axis */}
                <h3
                  id={'year-' + group.year}
                  className="font-display text-lg font-bold text-wiki-black dark:text-gray-200 mb-6"
                >
                  {group.year}
                </h3>
                {group.events.map(function (evt, ei) {
                  var globalIdx = events.indexOf(evt);
                  var isLast = globalIdx === events.length - 1;
                  var isFirstInYear = ei === 0;
                  return (
                    <div
                      key={gi + '-' + ei}
                      ref={function (el) { itemRefs.current[globalIdx] = el; }}
                      className={"relative " + (isLast ? "" : "mb-10")}
                      style={{ opacity: 0, transform: 'translateY(12px)', transition: 'opacity 0.5s ease, transform 0.5s ease' }}
                    >
                      {/* Horizontal tick from dot to content */}
                      <div className="absolute left-[-20px] top-[0.6em] w-5 h-px bg-gray-300 dark:bg-gray-700" />
                      {/* Dot — solid for first event of year, hollow for rest */}
                      <div
                        className={
                          "absolute left-[-28px] top-[calc(0.6em-4px)] w-[8px] h-[8px] rounded-full " +
                          (isFirstInYear
                            ? "bg-wiki-black dark:bg-gray-200"
                            : "border-2 border-wiki-black bg-white dark:border-gray-400 dark:bg-[#181818]"
                          )
                        }
                      />
                      <p className="text-sm text-neutral-700 dark:text-gray-400 leading-relaxed">{evt.event}</p>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

                <time className="text-[11px] text-neutral-400 dark:text-gray-500 tabular-nums">{article.date}</time>
              </div>
              <div className="intro-box border border-black dark:border-gray-700 p-6 mb-10">
                <p className="text-sm md:text-[15px] leading-relaxed text-neutral-800 dark:text-gray-300">{article.excerpt}</p>
              </div>
              <div className="article-body text-sm md:text-[15px] leading-relaxed text-neutral-800 dark:text-gray-300 pr-8 lg:pr-12 xl:pr-16 [&_h2]:mt-10 [&_h2]:mb-4 [&_h3]:mt-6 [&_h3]:mb-2 [&_p]:mb-4 [&_ul]:mb-4 [&_ol]:mb-4 [&_table]:mb-4 [&_table]:w-full [&_code]:bg-neutral-100 [&_code]:dark:bg-[#1f2937] [&_code]:px-1 [&_code]:border [&_code]:border-neutral-300 [&_code]:dark:border-gray-600 [&_code]:text-sm [&_a]:text-wiki-blue [&_a]:dark:text-blue-400 [&_a]:hover:underline [&_li]:leading-relaxed" dangerouslySetInnerHTML={{ __html: body }} />
            </div>
          </section>
        </>
      );
    }

    /* Websites page */
    function WebsitesPage() {
      return (
        <section className="border-b border-neutral-300 dark:border-gray-700">
          <div className="p-6 md:p-10 lg:p-14">
            <div className="flex items-baseline justify-between mb-8">
              <h1 className="font-display text-3xl md:text-4xl font-bold text-wiki-black dark:text-gray-100">My Websites</h1>
              <span className="text-[10px] text-neutral-400 dark:text-gray-500 uppercase tracking-[0.2em]">{websitesData.length} project{websitesData.length !== 1 ? 's' : ''}</span>
            </div>

            <div className="space-y-4">
              {websitesData.map((site) => (
                <article key={site.id} className="border border-black dark:border-gray-700 bg-white dark:bg-[#1a1a1a] p-6 hover:bg-neutral-50 dark:hover:bg-[#222] transition-colors">
                  <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-3 mb-3">
                    <h3 className="font-display text-xl font-bold text-wiki-black dark:text-gray-100">{site.name}</h3>
                    <span className={`text-[10px] font-semibold uppercase tracking-[0.15em] px-2 py-0.5 border ${site.status === 'Active' ? 'text-wiki-black dark:text-gray-200 border-black dark:border-gray-500' : 'text-neutral-400 dark:text-gray-500 border-neutral-300 dark:border-gray-600'}`}>
                      {site.status}
                    </span>
                  </div>
                  <p className="text-sm text-neutral-600 dark:text-gray-400 leading-relaxed mb-4">{site.description}</p>
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                    <span className="text-[10px] text-neutral-400 dark:text-gray-500 uppercase tracking-[0.15em]">{site.tech}</span>
                    <a
                      href={site.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="text-sm text-wiki-blue dark:text-blue-400 font-medium hover:underline"
                    >
                      Visit site →
                    </a>
                  </div>
                </article>
              ))}
            </div>

            {websitesData.length === 0 && (
              <div className="border border-neutral-300 dark:border-gray-700 p-8 text-center">
                <p className="text-sm text-neutral-500 dark:text-gray-500">No websites yet. Check back soon.</p>
              </div>
            )}
          </div>
        </section>
      );
    }

    /* Footer */
    function Footer() {
      return (
        <footer className="p-6 md:p-10 lg:p-14">
          <div className="border-t border-black dark:border-gray-700 pt-6">
            <p className="text-xs text-neutral-400 dark:text-gray-600">© 2026 ATM Blog. All rights reserved.</p>
          </div>
        </footer>
      );
    }

    /* ── App ────────────────────────────────────────────────── */

    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [menuOpen, setMenuOpen] = useState(false);
      const [selectedArticleId, setSelectedArticleId] = useState(null);
      const [isFading, setIsFading] = useState(false);
      const [darkMode, setDarkMode] = useState(() => {
        try {
          const stored = localStorage.getItem('atm-blog-dark');
          if (stored !== null) return stored === 'true';
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        } catch (_) { return false; }
      });

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        try { localStorage.setItem('atm-blog-dark', String(darkMode)); } catch (_) {}
      }, [darkMode]);

      function toggleDark() { setDarkMode(function (d) { return !d; }); }

      function handleNavigation(newView, articleId) {
        if (isFading) return;
        setIsFading(true);
        setTimeout(function () {
          setCurrentView(newView);
          setSelectedArticleId(articleId || null);
          setMenuOpen(false);
          window.scrollTo(0, 0);
          setIsFading(false);
        }, 150);
      }

      function navigate(view) {
        handleNavigation(view);
      }

      function openArticle(id) {
        handleNavigation('article', id);
      }

      return (
        <div className="min-h-screen bg-white dark:bg-[#121212] text-wiki-black dark:text-gray-200 font-body">
          <MobileTopBar onMenuClick={() => setMenuOpen(true)} darkMode={darkMode} toggleDark={toggleDark} />
          <TabletNavBar currentView={currentView} onNavigate={navigate} darkMode={darkMode} toggleDark={toggleDark} />
          <MobileNav isOpen={menuOpen} onClose={() => setMenuOpen(false)} onNavigate={navigate} currentView={currentView} darkMode={darkMode} toggleDark={toggleDark} />

          <div className="flex">
            <SidebarNav currentView={currentView} onNavigate={navigate} darkMode={darkMode} toggleDark={toggleDark} />

            <main className={"flex-1 min-w-0 transition-opacity duration-150 ease-in-out " + (isFading ? "opacity-0" : "opacity-100")}>
              {currentView === 'home' && <HomePage onNavigate={navigate} onOpenArticle={openArticle} />}
              {currentView === 'articles' && <ArticlesPage onOpenArticle={openArticle} />}
              {currentView === 'timeline' && <TimelinePage />}
              {currentView === 'websites' && <WebsitesPage />}
              {currentView === 'article' && <ArticleDetailPage articleId={selectedArticleId} onBack={() => navigate('articles')} />}
              <Footer />
              <MobileBottomBar />
            </main>

            <div className={"transition-opacity duration-150 ease-in-out " + (isFading ? "opacity-0" : "opacity-100")}>
              <RightSidebar currentView={currentView} />
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
